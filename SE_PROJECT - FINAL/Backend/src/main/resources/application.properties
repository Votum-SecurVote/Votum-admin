spring.datasource.url=jdbc:postgresql://localhost:5432/evoting
spring.datasource.username=evoting_app
spring.datasource.password=securePass123!

# Production Readiness: 'validate' validates constraints, 'update' allows safe changes.
# Using 'update' to ensure 'identity_type' column is created without manual SQL migration for this task.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# JWT Configuration
# In production, JWT_SECRET env var must be set.
# Default value here is ONLY for LOCAL DEVELOPMENT.
jwt.secret=${JWT_SECRET:verysecretkeythatislongenoughforhmacsha256algorithm}
jwt.expiration=86400000

# File to persist RSA keys
app.security.rsa.key-dir=./keys
