name: Admin Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ----------------------------------
      # 1️⃣ Checkout Repository
      # ----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------------
      # 2️⃣ Login to DockerHub
      # ----------------------------------
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ----------------------------------
      # 3️⃣ Build Docker Image (admin folder)
      # ----------------------------------
      - name: Build Docker Image
        working-directory: admin
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest .

      # ----------------------------------
      # 4️⃣ Push Docker Image
      # ----------------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

      # ----------------------------------
      # 5️⃣ Deploy to EC2
      # Host: 4000 → Container: 5000
      # Always restart container
      # ----------------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

            docker stop votum-admin || true
            docker rm votum-admin || true

            docker run -d \
              --name votum-admin \
              --restart always \
              -p 4000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

      # ----------------------------------
      # 6️⃣ Send Email if ANY Step Fails
      # ----------------------------------
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Admin Frontend Deployment Failed"
          body: |
            ❌ Admin Frontend deployment FAILED.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered By: ${{ github.actor }}
            Run ID: ${{ github.run_id }}

            Check GitHub Actions logs immediately.
          to: ${{ secrets.EMAIL_TO }}
          from: Votum CI/CD
