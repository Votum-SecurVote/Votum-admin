name: Admin Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: Votum-admin/admin

    steps:
      # -------------------------
      # Checkout Code
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Login to DockerHub
      # -------------------------
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------
      # Build Docker Image
      # -------------------------
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest .

      # -------------------------
      # Push Docker Image
      # -------------------------
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

      # -------------------------
      # Deploy to EC2
      # Host 4000 → Container 5000
      # -------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

            docker stop votum-admin || true
            docker rm votum-admin || true

            docker run -d \
              --name votum-admin \
              --restart unless-stopped \
              -p 4000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/votum-admin:latest

      # -------------------------
      # Send Email if Deployment Fails
      # -------------------------
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Admin Frontend Deployment Failed"
          body: |
            Admin Frontend deployment has FAILED.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered By: ${{ github.actor }}

            Check GitHub Actions immediately.
          to: ${{ secrets.EMAIL_TO }}
          from: Votum CI/CD
