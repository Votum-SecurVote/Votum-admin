# Vote Admin - Spring Boot backend
# Use env vars or profiles for local vs RDS

server:
  port: ${PORT:5000}

spring:
  application:
    name: vote-admin-backend

  # PostgreSQL - use profile 'local' or 'rds', or set env vars
  datasource:
    url: jdbc:postgresql://localhost:5432/vote_admin
    username: postgres
    password: mypassword123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

# JWT (use env JWT_SECRET in production)
jwt:
  secret: dev_secret_key_please_change_this_32_chars_minimum


---
# Local PostgreSQL (run: spring.profiles.active=local)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:vote_admin}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:mypassword123}

---
# AWS RDS (run: spring.profiles.active=rds)
# Set DATABASE_URL or PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring:
  config:
    activate:
      on-profile: rds
  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}
